# Nginx config for Docker Compose (web container = "web:8000")
upstream travelpro_app {
    server web:8000;
}

server {
    listen 80;
    server_name _;

    location /static/ {
        alias /var/www/travelpro/staticfiles/;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    location /media/ {
        alias /var/www/travelpro/media/;
        expires 30d;
        access_log off;
    }

    location / {
        proxy_pass http://travelpro_app;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        client_max_body_size 20M;
    }
}
