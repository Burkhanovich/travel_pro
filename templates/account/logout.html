{% extends "base.html" %}
{% load i18n %}

{% block title %}{% trans "Sign Out" %} | {{ SITE_NAME }}{% endblock %}

{% block content %}
<div class="min-h-screen bg-accent flex items-center justify-center px-4 py-20">
  <div class="w-full max-w-sm text-center">

    <div class="bg-white rounded-2xl shadow-sm border border-gray-100 p-10">
      <div class="w-16 h-16 bg-primary/10 rounded-full flex items-center justify-center mx-auto mb-5">
        <i class="ti ti-logout text-primary text-2xl"></i>
      </div>
      <h1 class="text-xl font-serif font-bold text-dark mb-2">{% trans "Sign Out?" %}</h1>
      <p class="text-gray-500 text-sm mb-6">{% trans "Are you sure you want to sign out of your account?" %}</p>

      <form method="post" action="{% url 'account_logout' %}">
        {% csrf_token %}
        <button type="submit" class="btn-primary w-full py-3 mb-3">
          {% trans "Yes, Sign Out" %}
        </button>
      </form>
      <a href="/" class="text-sm text-gray-400 hover:text-primary transition">
        {% trans "Cancel — go back" %}
      </a>
    </div>
  </div>
</div>
{% endblock %}
