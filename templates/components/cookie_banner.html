{% load i18n %}
<div
  x-data="{ show: !localStorage.getItem('cookieAccepted') }"
  x-show="show"
  x-transition:enter="transition ease-out duration-300"
  x-transition:enter-start="opacity-0 translate-y-4"
  x-transition:enter-end="opacity-100 translate-y-0"
  class="fixed bottom-4 left-4 right-4 md:left-auto md:right-6 md:max-w-md bg-dark text-white rounded-2xl shadow-2xl p-5 z-50"
>
  <div class="flex items-start gap-3">
    <i class="ti ti-cookie text-secondary text-2xl flex-shrink-0 mt-0.5"></i>
    <div>
      <p class="font-semibold text-sm mb-1">{% trans "We use cookies" %}</p>
      <p class="text-gray-400 text-xs leading-relaxed">
        {% trans "We use cookies to enhance your browsing experience and analyse traffic. By clicking 'Accept', you consent to our use of cookies." %}
      </p>
      <div class="flex gap-2 mt-3">
        <button
          @click="localStorage.setItem('cookieAccepted', '1'); show = false"
          class="btn-primary text-xs px-4 py-2">
          {% trans "Accept" %}
        </button>
        <a href="#" class="text-xs text-gray-400 hover:text-white px-3 py-2">{% trans "Learn more" %}</a>
      </div>
    </div>
  </div>
</div>
